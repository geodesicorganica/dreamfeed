<!-- @dsCard group="Components" viewport="700x230" name="Forms — TextField, Select, Switch" subtitle="Sunken wells, mono entry, knob-position toggles" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  html, body { margin: 0; }
  body { background: var(--df-bg-canvas); color: var(--text-primary); font-family: var(--font-sans); padding: 18px; }
  .grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 18px; align-items: start; }
  .stack { display: flex; flex-direction: column; gap: 14px; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel" data-presets="react">
  const { TextField, Select, Switch } = window.DreamfeedDesignSystem_7401df;
  function Demo() {
    const [a, setA] = React.useState('workgraph');
    const [b, setB] = React.useState('3000');
    const [lens, setLens] = React.useState('Topology');
    const [live, setLive] = React.useState(true);
    const [reduced, setReduced] = React.useState(false);
    return (
      <div className="grid">
        <div className="stack">
          <TextField label="Initiative" value={a} onChange={e => setA(e.target.value)} />
          <TextField label="Repo path" mono prefix="/" value={b === '3000' ? 'src/workgraph.js' : b} onChange={() => {}} />
        </div>
        <div className="stack">
          <TextField label="Port" mono value={b} onChange={e => setB(e.target.value)} error="Port 3000 in use" />
          <Select label="Lens" value={lens} onChange={e => setLens(e.target.value)}
            options={['Dashboard','Topology','IDE','Table','Document','Board']} />
        </div>
        <div className="stack" style={{ paddingTop: 4 }}>
          <Switch checked={live} onChange={setLive} label="Live telemetry" />
          <Switch checked={reduced} onChange={setReduced} label="Reduced motion" />
          <Switch checked={false} onChange={() => {}} disabled label="Execution (locked V1)" />
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body>
</html>
