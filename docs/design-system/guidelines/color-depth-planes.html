<!-- @dsCard group="Colors" viewport="700x150" name="Depth Planes" subtitle="Flat gray layers — depth via plane + 1px line, never shadow/glow" -->
<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  html,body{margin:0}
  body{background:var(--df-bg-canvas);font-family:var(--font-sans);padding:16px;display:flex;gap:10px}
  .sw{flex:1;border:1px solid var(--df-line);border-radius:var(--radius-2);height:104px;display:flex;flex-direction:column;justify-content:flex-end;padding:10px}
  .n{font-size:12px;font-weight:600;color:var(--text-primary)}
  .v{font-family:var(--font-mono);font-size:11px;color:var(--text-muted);margin-top:2px}
</style></head>
<body>
  <div class="sw" style="background:var(--df-bg-canvas)"><span class="n">Deep Canvas</span><span class="v">#202426</span></div>
  <div class="sw" style="background:var(--df-bg-sunken)"><span class="n">Sunken</span><span class="v">#1A1E20</span></div>
  <div class="sw" style="background:var(--df-panel)"><span class="n">Panel</span><span class="v">#272C2E</span></div>
  <div class="sw" style="background:var(--df-panel-raised)"><span class="n">Raised</span><span class="v">#303638</span></div>
  <div class="sw" style="background:var(--df-line)"><span class="n">Line</span><span class="v">#3B4142</span></div>
</body></html>
