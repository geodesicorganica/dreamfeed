<!-- @dsCard group="Spacing" viewport="700x170" name="Spacing Scale" subtitle="4px base unit — dense, aligned to the fine structural grid" -->
<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  html,body{margin:0}
  body{background:var(--df-bg-canvas);font-family:var(--font-mono);padding:18px;color:var(--text-primary);display:flex;flex-direction:column;gap:9px}
  .r{display:flex;align-items:center;gap:14px}
  .tok{font-size:11px;color:var(--text-muted);width:130px}
  .bar{height:12px;background:var(--df-amber);opacity:0.85;border-radius:1px}
  .px{font-size:11px;color:var(--text-secondary)}
</style></head>
<body>
  <div class="r"><span class="tok">--space-2</span><span class="bar" style="width:4px"></span><span class="px">4px</span></div>
  <div class="r"><span class="tok">--space-4</span><span class="bar" style="width:8px"></span><span class="px">8px</span></div>
  <div class="r"><span class="tok">--space-6</span><span class="bar" style="width:16px"></span><span class="px">16px</span></div>
  <div class="r"><span class="tok">--space-8</span><span class="bar" style="width:24px"></span><span class="px">24px</span></div>
  <div class="r"><span class="tok">--space-10</span><span class="bar" style="width:32px"></span><span class="px">32px</span></div>
  <div class="r"><span class="tok">--space-16</span><span class="bar" style="width:56px"></span><span class="px">56px</span></div>
</body></html>
