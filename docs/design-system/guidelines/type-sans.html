<!-- @dsCard group="Type" viewport="700x200" name="IBM Plex Sans — Structural" subtitle="Neo-grotesque for labels, region headers, navigation" -->
<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  html,body{margin:0}
  body{background:var(--df-bg-canvas);font-family:var(--font-sans);padding:18px;color:var(--text-primary)}
  .big{font-size:30px;font-weight:600;letter-spacing:0}
  .over{font-size:11px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:var(--text-muted);margin:16px 0 8px}
  .weights{display:flex;gap:22px;font-size:18px;align-items:baseline}
  .weights span{color:var(--text-secondary)}
  .w4{font-weight:400}.w5{font-weight:500}.w6{font-weight:600}.w7{font-weight:700}
</style></head>
<body>
  <div class="big">Topology of Leverage</div>
  <div class="over">Region header · Inspector · Bottom panel</div>
  <div class="weights">
    <span class="w4">Regular 400</span>
    <span class="w5">Medium 500</span>
    <span class="w6">Semibold 600</span>
    <span class="w7">Bold 700</span>
  </div>
  <div style="font-size:11px;color:var(--text-muted);margin-top:16px;font-family:var(--font-mono)">Thin weights (&lt;400) prohibited · no negative letter-spacing · no viewport-scaled type</div>
</body></html>
