<!-- @dsCard group="Type" viewport="700x230" name="Type Scale" subtitle="Restrained, dense scale — px, never viewport-scaled" -->
<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  html,body{margin:0}
  body{background:var(--df-bg-canvas);font-family:var(--font-sans);padding:16px 18px;color:var(--text-primary)}
  .r{display:flex;align-items:baseline;gap:16px;border-bottom:1px solid var(--df-line);padding:5px 0}
  .r:last-child{border-bottom:none}
  .tok{font-family:var(--font-mono);font-size:11px;color:var(--text-muted);width:120px;flex:0 0 auto}
  .s{color:var(--text-primary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
</style></head>
<body>
  <div class="r"><span class="tok">--fs-700 · 36</span><span class="s" style="font-size:36px;font-weight:600">Sovereign Execution</span></div>
  <div class="r"><span class="tok">--fs-500 · 22</span><span class="s" style="font-size:22px;font-weight:600">Deterministic Runtime</span></div>
  <div class="r"><span class="tok">--fs-400 · 18</span><span class="s" style="font-size:18px;font-weight:500">Right Inspector</span></div>
  <div class="r"><span class="tok">--fs-200 · 14</span><span class="s" style="font-size:14px">Default UI body and labels</span></div>
  <div class="r"><span class="tok">--fs-100 · 13</span><span class="s" style="font-size:13px;font-family:var(--font-mono)">operational data / log line</span></div>
  <div class="r"><span class="tok">--fs-50 · 11</span><span class="s" style="font-size:11px;text-transform:uppercase;letter-spacing:0.08em;color:var(--text-muted)">Micro overline</span></div>
</body></html>
