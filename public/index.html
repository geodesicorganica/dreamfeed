<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Dreamfeed — Stakeport OS Command Center (Operational Core)</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <header>
    <h1 id="logo" title="Back to Overview"><span class="accent">Dream</span>feed</h1>
    <span class="subtitle">Stakeport OS Command Center — Operational Core (Brief A) · read-only</span>
    <span class="host-note" id="hostNote">localhost-only · pull architecture · zero write-back</span>
  </header>
  <nav id="tabs">
    <button data-tab="overview" class="active">Overview</button>
    <button data-tab="board">OS State Board</button>
    <button data-tab="queue">Approval Queue</button>
    <button data-tab="topology">Topology</button>
    <button data-tab="roadmap">Roadmap</button>
    <button data-tab="milestones">Milestones</button>
    <button data-tab="review">Review</button>
    <button data-tab="learning">Learning</button>
    <button data-tab="sources">Sources</button>
    <button data-tab="health">Repo Health</button>
    <span class="nav-spacer"></span>
    <button id="refreshBtn" class="global-refresh" title="Re-read all governance and repo-health data">Refresh</button>
    <span class="nav-meta" id="loadMeta" aria-live="polite"></span>
  </nav>
  <div class="controls">
    <input id="filterText" type="text" placeholder="Filter (name, action, decision…)" />
    <select id="filterStatus">
      <option value="">All statuses</option>
    </select>
  </div>
  <main id="main"><p style="color:var(--type-muted)">Loading OS state…</p></main>
  <aside id="sidepanel" aria-hidden="true">
    <div class="sp-head">
      <div><div class="sp-title" id="spTitle"></div><div class="sp-meta" id="spMeta"></div></div>
      <button class="sp-close" id="spClose">✕ close</button>
    </div>
    <div class="sp-body" id="spBody"></div>
  </aside>
  <script src="/app.js"></script>
</body>
</html>
