name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  portable:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm test
        # Integration tests that need a real Stakeport OS checkout stay
        # local-only (see docs/workflows/verification-workflow.md).
